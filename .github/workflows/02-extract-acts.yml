name: "Step 2: Extract Acts from Volumes"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract-acts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Extract act metadata into CSV files
        run: python scripts/extract_acts_from_volumes.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/volumes/csv/ files/htmls/volumes/
          git diff --staged --quiet || git commit -m "chore: update volume CSV files [skip ci]"
          git push
