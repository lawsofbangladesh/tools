name: "Step 3: Download Act HTMLs"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download-htmls:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download all act HTML files
        run: python scripts/download_act_htmls.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/htmls/laws/
          git diff --staged --quiet || git commit -m "chore: update downloaded act HTML files [skip ci]"
          git push
