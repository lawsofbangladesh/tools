name: "Step 1: Fetch Volume List"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-volume-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch volume list from bdlaws.minlaw.gov.bd
        run: python scripts/fetch_volume_list.py

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/volumes/volume_list.json files/htmls/
          git diff --staged --quiet || git commit -m "chore: update volume list [skip ci]"
          git push
